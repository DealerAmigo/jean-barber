<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Panel · Jean The Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --black:#080808;--dark-1:#101010;--dark-2:#171717;--dark-3:#202020;--dark-4:#2a2a2a;
      --silver-dim:#3f3f3f;--silver-mid:#6e6e6e;--silver:#a8a8a8;--silver-light:#d8d8d8;
      --white:#f0f0f0;--gold:#b8975a;--gold-dim:rgba(184,151,90,.15);
      --green:#4caf7d;--red:#e05555;
      --font-display:'Cormorant Garamond',Georgia,serif;
      --font-ui:'Rajdhani',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--black);color:var(--silver-light);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;min-height:100vh}
    ::selection{background:var(--gold);color:#000}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--dark-1)}::-webkit-scrollbar-thumb{background:var(--silver-dim)}
    header{border-bottom:1px solid var(--dark-3);padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(8,8,8,.92);backdrop-filter:blur(12px)}
    .header-brand{display:flex;align-items:center;gap:.8rem}
    .header-icon{width:36px;height:36px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .header-name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--white)}
    .header-sub{font-size:.75rem;letter-spacing:.15em;color:var(--silver-mid);text-transform:uppercase}
    .header-badge{background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);font-size:.7rem;font-weight:700;letter-spacing:.12em;padding:.3rem .7rem;text-transform:uppercase}
    .tabs{display:flex;border-bottom:1px solid var(--dark-3);padding:0 1.5rem}
    .tab{padding:1rem 1.5rem;font-size:.8rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--silver-mid);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-ui)}
    .tab:hover{color:var(--silver-light)}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
    main{max-width:700px;margin:0 auto;padding:2rem 1.5rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--dark-3);border:1px solid var(--dark-3);margin-bottom:2rem}
    .stat{background:var(--dark-1);padding:1.2rem 1rem;text-align:center}
    .stat-num{font-family:var(--font-display);font-size:2rem;font-weight:600;color:var(--gold)}
    .stat-label{font-size:.65rem;letter-spacing:.18em;color:var(--silver-mid);text-transform:uppercase;margin-top:.2rem}
    .sec-label{font-size:.7rem;font-weight:700;letter-spacing:.35em;color:var(--silver-dim);text-transform:uppercase;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--dark-3)}
    .booking-card{background:var(--dark-1);border:1px solid var(--dark-3);margin-bottom:.8rem;transition:border-color .2s;animation:card-in .3s ease both}
    @keyframes card-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .booking-card.confirmado{border-left:3px solid var(--green)}
    .booking-card.cancelado{border-left:3px solid var(--red);opacity:.5}
    .booking-card.pendiente{border-left:3px solid var(--gold)}
    .card-top{padding:1.2rem 1.2rem .8rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
    .card-name{font-size:1.1rem;font-weight:700;letter-spacing:.06em;color:var(--white);margin-bottom:.3rem}
    .card-service{font-family:var(--font-display);font-style:italic;font-size:1.2rem;color:var(--gold);margin-bottom:.4rem}
    .card-meta{display:flex;flex-wrap:wrap;gap:.5rem .8rem}
    .card-meta-item{font-size:.8rem;color:var(--silver-mid);letter-spacing:.04em;display:flex;align-items:center;gap:.3rem}
    .card-meta-item svg{width:12px;height:12px;opacity:.6;flex-shrink:0}
    .status-pill{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:.3rem .7rem;border-radius:20px}
    .status-pill.pendiente{background:rgba(184,151,90,.12);color:var(--gold);border:1px solid rgba(184,151,90,.3)}
    .status-pill.confirmado{background:rgba(76,175,125,.12);color:var(--green);border:1px solid rgba(76,175,125,.3)}
    .status-pill.cancelado{background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.3)}
    .card-actions{padding:.8rem 1.2rem;border-top:1px solid var(--dark-3);display:flex;gap:.6rem;flex-wrap:wrap}
    .btn{padding:.6rem 1.2rem;font-family:var(--font-ui);font-size:.75rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .2s;background:transparent}
    .btn-confirm{border-color:var(--green);color:var(--green)}
    .btn-confirm:hover{background:var(--green);color:#000}
    .btn-cancel-booking{border-color:var(--silver-dim);color:var(--silver-mid)}
    .btn-cancel-booking:hover{border-color:var(--red);color:var(--red)}
    .btn-wa{border-color:rgba(37,211,102,.4);color:#25D366;display:flex;align-items:center;gap:.4rem;text-decoration:none}
    .btn-wa:hover{background:#25D366;color:#000}
    .btn-wa svg{width:13px;height:13px}
    .btn:disabled{opacity:.3;cursor:not-allowed}
    .empty{text-align:center;padding:4rem 1.5rem;border:1px solid var(--dark-3)}
    .empty-icon{font-family:var(--font-display);font-size:3rem;color:var(--gold);margin-bottom:1rem;display:block;font-style:italic;opacity:.4}
    .empty-text{color:var(--silver-mid);font-size:.9rem;letter-spacing:.06em}
    .loading{text-align:center;padding:3rem;color:var(--silver-dim);font-size:.8rem;letter-spacing:.2em;text-transform:uppercase}
    .loading::after{content:'';animation:dots 1.2s steps(3,end) infinite}
    @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
    #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark-2);border:1px solid var(--dark-4);color:var(--silver-light);padding:.8rem 1.5rem;font-size:.85rem;letter-spacing:.06em;transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.success{border-color:rgba(76,175,125,.4);color:var(--green)}
    #toast.error{border-color:rgba(224,85,85,.4);color:var(--red)}
    @media(max-width:480px){.tabs .tab{padding:.8rem .8rem;font-size:.7rem;letter-spacing:.1em}.stat-num{font-size:1.5rem}}
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-icon">✂</div>
    <div>
      <div class="header-name">Jean The Barber</div>
      <div class="header-sub">Panel de Citas</div>
    </div>
  </div>
  <div class="header-badge" id="pending-badge">— pendientes</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pending')">Pendientes</button>
  <button class="tab" onclick="switchTab('all')">Todas</button>
</div>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-num" id="stat-confirmed">—</div><div class="stat-label">Confirmadas</div></div>
    <div class="stat"><div class="stat-num" id="stat-today">—</div><div class="stat-label">Hoy</div></div>
  </div>
  <div id="list-container"><div class="loading">Cargando citas</div></div>
</main>

<div id="toast"></div>

<script>
"use strict";

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTCt71TakFw-s5stiqCNWxzy2b9F1ECusL2I4cTlrjQln3YcnQFpA0iqeLAc4FwooUXg/exec";
const BARBER_PHONE    = "17875301101";
const BASE_URL        = window.location.href.replace(/panel\.html.*$/, "");
const VALID_TOKEN     = "jb8x92kqmn47tz3r";

// ── VERIFICAR TOKEN ──────────────────────────────────────────
(function checkToken() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get("token");
  if (token !== VALID_TOKEN) {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;font-family:'Rajdhani',sans-serif;">
        <div style="font-size:2rem;color:#b8975a;font-family:'Cormorant Garamond',serif;font-style:italic;">✂</div>
        <div style="color:#6e6e6e;font-size:.9rem;letter-spacing:.1em;">Acceso no autorizado</div>
      </div>`;
    throw new Error("Token inválido");
  }
})();

const DIAS_ES  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const MESES_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

let currentTab  = "pending";
let allBookings = [];

async function init() {
  await loadAll();
  render();
}

async function loadAll() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=all");
    const data = await res.json();
    if (data.ok) allBookings = data.bookings || [];
    updateStats();
  } catch(e) { showToast("Error cargando citas", "error"); }
}

function parseLocalDate(raw) {
  if (!raw) return null;
  const s = String(raw).substring(0,10).replace(/\//g,"-");
  const parts = s.split("-").map(Number);
  if (parts.length === 3 && parts[0] > 1970) return new Date(parts[0], parts[1]-1, parts[2]);
  return null;
}

function formatDate(raw) {
  const d = parseLocalDate(raw);
  if (!d || isNaN(d)) return String(raw||"—");
  const dia = DIAS_ES[d.getDay()], mes = MESES_ES[d.getMonth()];
  return dia.charAt(0).toUpperCase()+dia.slice(1,3)+", "+d.getDate()+" "+mes.substring(0,3);
}

function updateStats() {
  const today = new Date();
  const todayStr = today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  const pending    = allBookings.filter(b => b.status==="Pendiente").length;
  const confirmed  = allBookings.filter(b => b.status==="Confirmado").length;
  const todayCount = allBookings.filter(b => {
    const d = parseLocalDate(b.date);
    if (!d) return false;
    const ds = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    return ds === todayStr && b.status !== "Cancelado";
  }).length;
  document.getElementById("stat-pending").textContent   = pending;
  document.getElementById("stat-confirmed").textContent = confirmed;
  document.getElementById("stat-today").textContent     = todayCount;
  document.getElementById("pending-badge").textContent  = pending+" pendiente"+(pending!==1?"s":"");
}

function render() {
  const container = document.getElementById("list-container");
  let list = [...allBookings];
  if (currentTab === "pending") list = list.filter(b => b.status==="Pendiente");
  list.sort((a,b) => {
    const da = parseLocalDate(a.date), db = parseLocalDate(b.date);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });
  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><span class="empty-icon">✓</span><p class="empty-text">${currentTab==="pending"?"No hay citas pendientes":"No hay citas registradas"}</p></div>`;
    return;
  }
  container.innerHTML = `<div class="sec-label">${currentTab==="pending"?"Citas Pendientes":"Todas las Citas"} · ${list.length}</div>`;
  list.forEach(b => container.appendChild(buildCard(b)));
}

function buildCard(b) {
  const div = document.createElement("div");
  const statusClass = (b.status||"Pendiente").toLowerCase();
  div.className = "booking-card " + statusClass;
  div.id = "card-" + b.id;
  const isPending   = b.status === "Pendiente";
  const confirmUrl  = BASE_URL + "confirm.html?id=" + b.id;
  const waMsg       = "¡Hola "+b.name+"! ✂️ Tu cita con *Jean The Barber* está *confirmada*.\n\nVe los detalles aquí:\n"+confirmUrl+"\n\nCualquier pregunta escríbeme. 🙌";
  const waLink      = "https://wa.me/"+b.phone.replace(/\D/g,"")+"?text="+encodeURIComponent(waMsg);

  div.innerHTML = `
    <div class="card-top">
      <div class="card-info">
        <div class="card-name">${b.name}</div>
        <div class="card-service">${b.service}</div>
        <div class="card-meta">
          <span class="card-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${formatDate(b.date)}
          </span>
          <span class="card-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
            ${b.time}
          </span>
          <span class="card-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            $${b.price}
          </span>
          <span class="card-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.09 6.09l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${b.phone}
          </span>
        </div>
      </div>
      <div><span class="status-pill ${statusClass}">${b.status}</span></div>
    </div>
    <div class="card-actions">
      ${isPending ? `
        <button class="btn btn-confirm" id="confirm-${b.id}">✓ Confirmar</button>
        <button class="btn btn-cancel-booking" id="cancel-${b.id}">✕ Cancelar</button>
      ` : ""}
      <a class="btn btn-wa" href="${waLink}" target="_blank" rel="noopener">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 3C9.373 3 4 8.373 4 15c0 2.385.668 4.61 1.832 6.51L4 29l7.686-1.81A12.94 12.94 0 0 0 16 28c6.627 0 12-5.373 12-12S22.627 3 16 3z"/></svg>
        ${isPending ? "WhatsApp cliente" : "Reenviar confirmación"}
      </a>
    </div>`;

  // Confirmar — primero abre WA (desde el click), luego hace fetch
  const confirmBtn = div.querySelector("#confirm-"+b.id);
  if (confirmBtn) {
    confirmBtn.addEventListener("click", () => {
      // Abrir WhatsApp INMEDIATAMENTE desde el click (antes del async)
      window.open(waLink, "_blank");
      // Luego confirmar en la sheet
      confirmBooking(b.id, confirmBtn, b);
    });
  }

  const cancelBtn = div.querySelector("#cancel-"+b.id);
  if (cancelBtn) {
    cancelBtn.addEventListener("click", () => cancelBooking(b.id, cancelBtn));
  }

  return div;
}

async function confirmBooking(id, btn, booking) {
  btn.disabled = true;
  btn.textContent = "Confirmando...";
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=confirm&id=" + id);
    const data = await res.json();
    if (data.ok) {
      const b = allBookings.find(b => b.id === id);
      if (b) b.status = "Confirmado";
      updateStats();
      render();
      showToast("✓ Cita confirmada · WA enviado", "success");
    } else {
      showToast("Error: " + (data.error||""), "error");
      btn.disabled = false;
      btn.textContent = "✓ Confirmar";
    }
  } catch(e) {
    showToast("Error de conexión", "error");
    btn.disabled = false;
    btn.textContent = "✓ Confirmar";
  }
}

async function cancelBooking(id, btn) {
  if (!window.confirm("¿Cancelar esta cita?")) return;
  btn.disabled = true;
  try {
    const res  = await fetch(APPS_SCRIPT_URL + "?action=cancel&id=" + id);
    const data = await res.json();
    if (data.ok) {
      const b = allBookings.find(b => b.id === id);
      if (b) b.status = "Cancelado";
      updateStats();
      render();
      showToast("Cita cancelada", "error");
    }
  } catch(e) { showToast("Error de conexión", "error"); }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active",(i===0&&tab==="pending")||(i===1&&tab==="all"));
  });
  render();
}

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show "+type;
  setTimeout(() => t.className = "", 3000);
}

init().then(() => {
  // Si viene con ?id=JB-XXX desde el Calendar, resaltar esa cita
  const targetId = new URLSearchParams(window.location.search).get("id");
  if (targetId) {
    const card = document.getElementById("card-" + targetId);
    if (card) {
      card.style.border = "1px solid var(--gold)";
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }
});
setInterval(async () => { await loadAll(); render(); }, 60000);
</script>
</body>
</html>
